<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"> -->
  <!-- Theme: Simple -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    .app-name {
      text-align: inherit !important;
    }
    .sidebar > h1 img {
      max-height: 50px;
    }
    .sidebar-toggle-button {
      background: #f7f7f7 !important;
    }
    .sidebar-nav li > a {
      background-image: none !important;
    }
    .markdown-section {
      padding: 2rem;
    }
    .pagination-item {
      padding: 1rem;
      margin-top: 2em !important;
      min-width: 100%;
      background: #fff;
      border-radius: 4px;
      border: 1px solid rgba(227,232,237,1.00);
      box-shadow: 0px 1px 2px rgba(0,0,0,0.12);
    }
    .pagination-item--next .pagination-item-title {
      text-align: start;
    }
    .pagination-item--previous .pagination-item-title {
      text-align: end;
    }
    @media (min-width: 48em) {
      .sidebar+.content {
        margin-left: var(--sidebar-width);
      }
      .pagination-item {
        min-width: 48%;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      logo: '/_images/logo.svg',
      name: 'Acckenn | Docs',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      homepage: "README.md"
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- docsify-themeable (latest v0.x.x) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <!-- 6. Docsify Plugins -->
  <script src="https://unpkg.com/docsify/lib/plugins/search.js"></script>
  <!-- <script src="https://unpkg.com/docsify-copy-code"></script> -->
  <script src="https://unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- <script src="https://unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script> -->
</body>
</html>
